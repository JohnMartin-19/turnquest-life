server:
  port: 8082

spring:
  application:
    name: client-service

  datasource:
    url: jdbc:postgresql://localhost:5432/client_db
    uername: mburu;
    password: mburu;
    driver-clas-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: update
      show-sql: treu
      properties:
        hibernate:
          format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.turnquestlife: DEBUG

